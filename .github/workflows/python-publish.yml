# Upload Python Package — builds and publishes both condi-slm and condi-llm
# to PyPI using Trusted Publishing (OIDC). No API tokens required.
#
# Prerequisite: register a Trusted Publisher for EACH project on PyPI:
#   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
# Point each publisher at:
#   - PyPI Project Name:  condi-slm  (and separately condi-llm)
#   - Owner:              Shimba-crypto
#   - Repository:         condi-llm
#   - Workflow filename:  .github/workflows/python-publish.yml
#   - Environment name:   pypi

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch: # allow manual runs for testing the pipeline

permissions:
  contents: read

jobs:
  release-build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # let the other package finish even if one fails
      matrix:
        package: [condi-slm, condi-llm]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        working-directory: packages/${{ matrix.package }}
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist/

  pypi-publish:
    name: Publish ${{ matrix.package }} to PyPI
    runs-on: ubuntu-latest
    needs: release-build
    strategy:
      fail-fast: false
      matrix:
        package: [condi-slm, condi-llm]
    permissions:
      # IMPORTANT: mandatory for Trusted Publishing. Job-level is strongly
      # recommended by PyPI to minimize credential exposure.
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.package }}/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-${{ matrix.package }}
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Digital attestations (PEP 740) are ON by default for Trusted
          # Publishing — no need to enable them explicitly.
