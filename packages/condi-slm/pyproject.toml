[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "condi-slm"
version = "2.4.2"
description = "Edge-first small language model runtime. Sub-15ms first-token latency on commodity CPUs."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
authors = [{ name = "Condi Limited", email = "hello@condi.ltd" }]
keywords = ["llm", "slm", "inference", "edge", "pytorch", "quantization"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "torch>=2.0",
    "tqdm>=4.65",
]

[project.optional-dependencies]
onnx = ["onnx>=1.14", "onnxruntime>=1.16"]
server = ["fastapi>=0.100", "uvicorn>=0.23"]
dev = ["pytest>=7.4", "ruff>=0.1", "mypy>=1.5"]

[project.urls]
Homepage = "https://github.com/Shimba-crypto/condi-llm"
Documentation = "https://shimba-crypto.github.io/condi-llm/"
Repository = "https://github.com/Shimba-crypto/condi-llm"

[tool.hatch.build.targets.wheel]
packages = ["src/condi_slm"]
