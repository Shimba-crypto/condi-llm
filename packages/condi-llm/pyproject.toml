[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "condi-llm"
version = "0.9.0"
description = "Distributed training and serving framework for models up to 405B parameters."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
authors = [{ name = "Condi Limited", email = "hello@condi.ltd" }]
keywords = ["llm", "training", "distributed", "fsdp", "pytorch", "rlhf"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "torch>=2.2",
    "tqdm>=4.65",
]

[project.optional-dependencies]
trace = ["opentelemetry-api>=1.20", "opentelemetry-sdk>=1.20"]
dev = ["pytest>=7.4", "ruff>=0.1", "mypy>=1.5"]

[project.urls]
Homepage = "https://github.com/Shimba-crypto/condi-llm"
Documentation = "https://shimba-crypto.github.io/condi-llm/"
Repository = "https://github.com/Shimba-crypto/condi-llm"

[tool.hatch.build.targets.wheel]
packages = ["src/condi_llm"]
